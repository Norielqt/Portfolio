<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Websites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
        }
        
        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        
        .websites-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .website-card {
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .website-card:hover {
            background: #667eea;
            color: white;
            border-color: #764ba2;
            transform: translateY(-5px);
        }
        
        .website-card h2 {
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        
        .website-card p {
            opacity: 0.7;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .websites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Websites</h1>
        <div class="websites-grid">
            <a href="/verada" class="website-card">
                <h2>Verada</h2>
                <p>Check out this project</p>
            </a>
            <a href="/lumiere" class="website-card">
                <h2>Lumiere</h2>
                <p>Check out this project</p>
            </a>
            <a href="/website2" class="website-card">
                <h2>Website 2</h2>
                <p>Another awesome project</p>
            </a>
        </div>
    </div>
</body>
</html>
