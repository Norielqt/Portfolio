<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep blue diagonal gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <!-- Subtle inner highlight -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" filter="url(#shadow)" />
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)" />

  <!-- Decorative accent line (bottom-right corner detail) -->
  <line x1="44" y1="56" x2="58" y2="56" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.7" />

  <!-- "N" drawn with paths for crisp rendering at small sizes -->
  <!-- Left vertical bar -->
  <rect x="10" y="16" width="6" height="32" rx="2" fill="white" />
  <!-- Diagonal stroke -->
  <polygon points="16,16 22,16 34,40 34,48 28,48 16,24" fill="white" />
  <!-- Right vertical bar -->
  <rect x="28" y="16" width="6" height="32" rx="2" fill="white" />

  <!-- "F" -->
  <!-- Left vertical bar of F -->
  <rect x="38" y="16" width="6" height="32" rx="2" fill="white" />
  <!-- Top horizontal bar of F -->
  <rect x="38" y="16" width="16" height="6" rx="2" fill="white" />
  <!-- Middle horizontal bar of F -->
  <rect x="38" y="28" width="13" height="5" rx="2" fill="white" />
</svg>
